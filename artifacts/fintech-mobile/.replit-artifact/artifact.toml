kind = "mobile"
previewPath = "/"
title = "Gestão Financeira"
version = "1.0.0"
id = "artifacts/fintech-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21524

[services.development]
run = "pnpm --filter @workspace/fintech-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintech-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fintech-mobile", "run", "serve" ]

[services.env]
PORT = "21524"
BASE_PATH = "/"
